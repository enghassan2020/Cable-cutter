<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="manifest.json"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>Epic Cable Cutter</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ═══ RESET ══════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Cairo',sans-serif;background:#f0f2f5;color:#1a1d23;direction:rtl;font-size:14px;line-height:1.5}

/* ═══ LAYOUT ══════════════════════════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;background:#f0f2f5;box-shadow:0 0 40px rgba(0,0,0,.1)}

/* ═══ HEADER ═══════════════════════════════════════════════════════ */
.hdr{background:#fff;border-bottom:1px solid #e8eaed;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{width:52px;height:34px;object-fit:contain}
.hdr-co{font-size:11px;font-weight:900;color:#c0392b;letter-spacing:.4px;line-height:1.2}
.hdr-sub{font-size:9px;color:#9aa0ab;font-weight:600}
.hdr-stats{display:flex;gap:14px}
.hdr-stat{text-align:center}
.hdr-stat-n{font-size:18px;font-weight:800;line-height:1}
.hdr-stat-l{font-size:9px;color:#9aa0ab}

/* ═══ TABS ════════════════════════════════════════════════════════ */
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8eaed;flex-shrink:0}
.tab{flex:1;border:none;background:none;color:#9aa0ab;font-family:'Cairo',sans-serif;font-size:11px;padding:9px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
.tab.on{color:#c0392b;border-bottom-color:#c0392b;background:rgba(192,57,43,.04)}
.tab-ic{font-size:16px}
.tab:disabled{opacity:.3;cursor:not-allowed}

/* ═══ PAGE ════════════════════════════════════════════════════════ */
.page{flex:1;overflow-y:auto;padding:12px;display:none;-webkit-overflow-scrolling:touch;background:#f0f2f5}
.page.on{display:block}

/* ═══ CARDS ═══════════════════════════════════════════════════════ */
.card{background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:13px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:12px;font-weight:800;color:#1a1d23;margin-bottom:10px;display:flex;align-items:center;gap:5px}

/* ═══ FORM ════════════════════════════════════════════════════════ */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid2 .full{grid-column:span 2}
.fld{display:flex;flex-direction:column;gap:3px}
.lbl{font-size:10px;color:#6b7280;font-weight:700}
input,select{background:#f8f9fa;border:1.5px solid #e8eaed;border-radius:8px;padding:9px 10px;color:#1a1d23;font-size:13px;font-family:'Cairo',sans-serif;width:100%;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#c0392b;background:#fff;box-shadow:0 0 0 3px rgba(192,57,43,.08)}
select option{background:#fff}

/* ═══ CHIPS ═══════════════════════════════════════════════════════ */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{display:inline-flex;align-items:center;gap:4px;background:#fef2f2;border:1px solid #fecaca;border-radius:16px;padding:3px 10px;font-size:11px;color:#c0392b;font-weight:600}
.chip-x{background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:0 1px;font-weight:bold}
.no-sec{font-size:10px;color:#9aa0ab;margin-top:7px}

/* ═══ BUTTONS ════════════════════════════════════════════════════ */
.btn{border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;width:100%;padding:11px}
.btn:active{transform:scale(.98);opacity:.9}
.btn-red{background:linear-gradient(135deg,#e74c4c,#c0392b);color:#fff;font-size:13px;box-shadow:0 2px 8px rgba(192,57,43,.25)}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-size:14px;font-weight:800;margin-top:12px;padding:13px;border-radius:10px;box-shadow:0 3px 14px rgba(59,130,246,.3)}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:13px;margin-top:8px;box-shadow:0 2px 10px rgba(16,185,129,.25)}
.btn-pdf{background:linear-gradient(135deg,#e74c4c,#c0392b);color:#fff;font-size:13px;margin-top:8px;box-shadow:0 2px 10px rgba(192,57,43,.25)}
.btn-drive{background:linear-gradient(135deg,#4285f4,#1a73e8);color:#fff;font-size:12px;flex:1;padding:9px}
.btn-json{background:#f0f2f5;border:1.5px solid #e8eaed;color:#374151;font-size:12px;flex:1;padding:9px;border-radius:9px}
.btn-wa{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;font-size:13px;margin-top:8px;box-shadow:0 2px 10px rgba(37,211,102,.2)}
.btn-sec{background:#f8f9fa;border:1.5px solid #e8eaed;color:#374151;font-size:12px;margin-top:8px;border-radius:9px}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* ═══ TABLE ══════════════════════════════════════════════════════ */
.tbl-wrap{border:1px solid #e8eaed;border-radius:10px;overflow:hidden;margin-top:8px;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:11px}
thead tr{background:#f8f9fa}
th{padding:8px 9px;color:#6b7280;font-weight:700;font-size:10px;text-align:right;border-bottom:1px solid #e8eaed;white-space:nowrap}
td{padding:8px 9px;border-bottom:1px solid #f3f4f6;white-space:nowrap;color:#374151}
tr:nth-child(even) td{background:#fafafa}
tr:nth-child(odd) td{background:#fff}
tr:last-child td{border-bottom:none}
.bdg{display:inline-block;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700}
.bdg-r{background:#fef2f2;color:#c0392b;border:1px solid #fecaca}
.bdg-b{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.del-btn{background:#fef2f2;color:#ef4444;border:1px solid #fecaca;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;font-family:'Cairo',sans-serif}

/* ═══ EMPTY ══════════════════════════════════════════════════════ */
.empty{text-align:center;color:#d1d5db;padding:30px 16px;display:flex;flex-direction:column;align-items:center;gap:6px}
.empty-ic{font-size:36px}

/* ═══ RESULT ═════════════════════════════════════════════════════ */
.res-sec{margin-bottom:20px}
.res-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.res-badge{background:#fef2f2;color:#c0392b;border:1px solid #fecaca;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700}
.res-meta{display:flex;gap:8px;font-size:10px}
.prog{background:#f0f2f5;border-radius:100px;height:7px;overflow:hidden;margin-bottom:10px;border:1px solid #e8eaed}
.prog-bar{height:100%;background:linear-gradient(90deg,#10b981,#059669);border-radius:100px}
.warn{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:9px 11px;color:#92400e;font-size:11px;margin-bottom:8px;line-height:1.6}
.reel-card{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:11px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.reel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.reel-id{font-weight:800;font-size:13px;color:#1a1d23}
.reel-meta{font-size:10px;color:#9aa0ab;margin-top:2px}
.reel-used{color:#059669;font-size:11px;font-weight:700}
.reel-rem{color:#d97706;font-size:11px;font-weight:700}
.vis{display:flex;height:14px;border-radius:6px;overflow:hidden;margin-bottom:8px;border:1px solid #e8eaed}
.sum-card{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:12px;margin-top:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sum-ttl{font-weight:800;font-size:12px;color:#1a1d23;margin-bottom:8px}
.sum-row{display:flex;justify-content:space-between;font-size:11px;color:#6b7280;padding:5px 0;border-bottom:1px solid #f3f4f6}
.sum-row:last-child{border-bottom:none}

/* ═══ BACKUP CARD ════════════════════════════════════════════════ */
.backup-card{background:#fff;border:1px solid #e8eaed;border-radius:12px;padding:13px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.backup-title{font-size:12px;font-weight:800;color:#1a1d23;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.backup-btns{display:flex;gap:8px;margin-bottom:8px}
.import-msg{font-size:11px;color:#059669;margin-top:6px;display:none;font-weight:600;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:6px 10px}
.drive-note{font-size:10px;color:#9aa0ab;margin-top:6px;line-height:1.5}

/* ═══ PDF PRINT (light modern) ═════════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:0}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body,html{height:auto;overflow:visible;background:#f0f2f5!important}
  #app{display:none!important}
  #pv{display:block!important}
}
#pv{display:none}
.pp{width:210mm;min-height:297mm;background:#f0f2f5;color:#1a1d23;font-family:'Cairo',Arial,sans-serif;direction:rtl;page-break-after:always;display:flex;flex-direction:column}
.ph{background:#fff;border-bottom:3px solid #c0392b;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ph-top{display:flex;justify-content:space-between;align-items:center;padding:13px 20px}
.ph-brand{display:flex;align-items:center;gap:11px}
.ph-logo{height:36px;object-fit:contain}
.ph-co{color:#c0392b;font-size:14px;font-weight:900;letter-spacing:.3px}
.ph-cosub{color:#9aa0ab;font-size:9px;margin-top:2px;font-weight:600}
.ph-date{color:#6b7280;font-size:10px;text-align:left;line-height:1.9}
.ph-date b{color:#1a1d23}
.ph-band{background:#fff;border-top:1px solid #f0f2f5;border-bottom:1px solid #e8eaed;padding:7px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ph-sbadge{background:#fef2f2;color:#c0392b;border:1px solid #fecaca;border-radius:5px;padding:2px 10px;font-size:11px;font-weight:800}
.ph-stat{font-size:10px;color:#9aa0ab}
.ph-stat b{color:#374151;font-weight:700}
.ph-pbar{flex:1;height:6px;background:#f0f2f5;border-radius:3px;overflow:hidden;min-width:50px;border:1px solid #e8eaed}
.ph-pfill{height:100%;background:linear-gradient(90deg,#10b981,#059669)}
.pb{flex:1;padding:11px 20px}
.pb-warn{background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:7px 12px;color:#92400e;font-size:10px;margin-bottom:9px;line-height:1.6}
.pr{background:#fff;border:1px solid #e8eaed;border-radius:10px;overflow:hidden;margin-bottom:11px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.pr-hdr{background:#1a1d23;padding:8px 13px;display:flex;justify-content:space-between;align-items:center}
.pr-title{color:#fff;font-size:12px;font-weight:800}
.pr-info{font-size:10px;color:rgba(255,255,255,.6)}
.pr-used{color:#34d399;font-weight:700}
.pr-rem{color:#fbbf24;font-weight:700}
.pr-vis{height:11px;display:flex;background:#f8f9fa;border-bottom:1px solid #f0f2f5}
.pr-legend{padding:7px 13px 5px;display:flex;flex-wrap:wrap;gap:7px;background:#f8f9fa;border-bottom:1px solid #e8eaed}
.pr-leg{display:flex;align-items:center;gap:4px}
.pr-leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pr-leg-txt{font-size:9px;color:#374151}
.pr-leg-txt b{color:#1a1d23}
.pt{width:100%;border-collapse:collapse;font-size:10px}
.pt thead tr{background:#f8f9fa}
.pt th{color:#6b7280;padding:5px 8px;text-align:right;font-size:9px;border-bottom:1px solid #e8eaed;font-weight:700;white-space:nowrap}
.pt td{padding:5px 8px;border-bottom:1px solid #f3f4f6;color:#374151}
.pt tr:nth-child(even) td{background:#fafafa}
.pt tr:nth-child(odd) td{background:#fff}
.pt .waste td{background:#fffbeb;color:#92400e;font-style:italic}
.ps{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:11px 13px;margin-top:9px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.ps-ttl{color:#1a1d23;font-size:12px;font-weight:800;margin-bottom:7px;padding-bottom:5px;border-bottom:2px solid #f0f2f5}
.pf{background:#1a1d23;padding:7px 20px;display:flex;justify-content:space-between;align-items:center;font-size:9px;color:rgba(255,255,255,.45);flex-shrink:0;margin-top:auto}
.pf-brand{color:#e74c4c;font-weight:800;font-size:10px}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const state={sections:[],reels:[],cuts:[],result:null};
let deferredInstall=null;

/* install prompt removed */
/* install btn removed */

/* uploadLogo removed */
/* savedLogo removed */

const uid=()=>Math.random().toString(36).slice(2,8).toUpperCase();
function updateStats(){
  document.getElementById('sn-r').textContent=state.reels.length;
  document.getElementById('sn-c').textContent=state.cuts.length;
}
function switchTab(name){
  ['reels','cuts','result'].forEach(t=>{
    document.getElementById('page-'+t).style.display=t===name?'':'none';
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
  });
}

function addSection(){
  const inp=document.getElementById('new-section-input');
  const val=inp.value.trim();
  if(!val)return;
  if(state.sections.find(s=>s.label===val)){inp.value='';return;}
  state.sections.push({id:uid(),label:val});
  inp.value='';
  renderSections();
}
function removeSection(id){
  const sec=state.sections.find(s=>s.id===id);
  if(!sec)return;
  const inUse=state.reels.some(r=>r.section===sec.label);
  if(inUse){alert('هذا القطاع مستخدم في بكرة — احذف البكرة أولاً');return;}
  state.sections=state.sections.filter(s=>s.id!==id);
  renderSections();
}
function renderSections(){
  const chips=document.getElementById('sec-chips');
  const hint=document.getElementById('sec-hint');
  hint.style.display=state.sections.length?'none':'';
  chips.innerHTML=state.sections.map(s=>
    `<div class="chip">${s.label} mm² <button class="chip-del" onclick="removeSection('${s.id}')">✕</button></div>`
  ).join('');
  const opts=`<option value="">— اختر القطاع —</option>`+state.sections.map(s=>`<option value="${s.label}">${s.label} mm²</option>`).join('');
  document.getElementById('reel-section').innerHTML=opts;
  updateCutSectionSelect();
}
function updateCutSectionSelect(){
  const secs=[...new Set(state.reels.map(r=>r.section))];
  document.getElementById('cut-section').innerHTML=
    `<option value="">— اختر القطاع —</option>`+secs.map(s=>`<option value="${s}">${s} mm²</option>`).join('');
}

function addReel(){
  const id=document.getElementById('reel-id').value.trim();
  const length=parseFloat(document.getElementById('reel-length').value);
  const section=document.getElementById('reel-section').value;
  if(!id||isNaN(length)||length<=0||!section)return;
  state.reels.push({uid:uid(),id,length,section});
  document.getElementById('reel-id').value='';
  document.getElementById('reel-length').value='';
  updateStats();renderReelsTable();updateCutSectionSelect();
  state.result=null;document.getElementById('tb-res').disabled=true;
}
function removeReel(u){
  state.reels=state.reels.filter(r=>r.uid!==u);
  updateStats();renderReelsTable();updateCutSectionSelect();
  state.result=null;document.getElementById('tb-res').disabled=true;
}
function renderReelsTable(){
  const wrap=document.getElementById('reels-list');
  if(!state.reels.length){wrap.innerHTML=`<div class="empty"><div class="empty-icon">🎡</div><div>لم تتم إضافة أي بكرة بعد</div></div>`;return;}
  wrap.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>رقم البكرة</th><th>القطاع</th><th>الطول</th><th></th></tr></thead>
    <tbody>${state.reels.map((r,i)=>`<tr><td>${i+1}</td><td><span class="badge badge-orange">${r.id}</span></td><td><span class="badge badge-blue">${r.section}</span></td><td><strong>${r.length} م</strong></td><td><button class="btn-del" onclick="removeReel('${r.uid}')">✕</button></td></tr>`).join('')}</tbody>
  </table></div>`;
}

function addCut(){
  const from=document.getElementById('cut-from').value.trim();
  const to=document.getElementById('cut-to').value.trim();
  const section=document.getElementById('cut-section').value;
  const length=parseFloat(document.getElementById('cut-length').value);
  if(!from||!to||!section||isNaN(length)||length<=0)return;
  state.cuts.push({uid:uid(),from,to,route:`${from} → ${to}`,section,length});
  document.getElementById('cut-from').value='';
  document.getElementById('cut-to').value='';
  document.getElementById('cut-length').value='';
  updateStats();renderCutsTable();
  state.result=null;document.getElementById('tb-res').disabled=true;
}
function removeCut(u){
  state.cuts=state.cuts.filter(c=>c.uid!==u);
  updateStats();renderCutsTable();
  state.result=null;document.getElementById('tb-res').disabled=true;
}
function renderCutsTable(){
  const wrap=document.getElementById('cuts-list');
  const runBtn=document.getElementById('run-btn');
  runBtn.style.display=(state.cuts.length>0&&state.reels.length>0)?'':'none';
  if(!state.cuts.length){wrap.innerHTML=`<div class="empty"><div class="empty-icon">✂️</div><div>لم تتم إضافة أي قطعة بعد</div></div>`;return;}
  wrap.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>#</th><th>من</th><th>إلى</th><th>القطاع</th><th>الطول</th><th></th></tr></thead>
    <tbody>${state.cuts.map((c,i)=>`<tr><td>${i+1}</td><td style="font-size:11px">${c.from}</td><td style="font-size:11px">${c.to}</td><td><span class="badge badge-blue">${c.section}</span></td><td><strong>${c.length} م</strong></td><td><button class="btn-del" onclick="removeCut('${c.uid}')">✕</button></td></tr>`).join('')}</tbody>
  </table></div>`;
}

function optimizeCuts(reels,cuts){
  const sorted=[...cuts].sort((a,b)=>b.length-a.length);
  const rs=reels.map(r=>({...r,remaining:r.length,assignments:[]}));
  const unassigned=[];
  for(const cut of sorted){
    let best=null,bestR=Infinity;
    for(const r of rs){const after=r.remaining-cut.length;if(after>=0&&after<bestR){bestR=after;best=r;}}
    if(best){best.remaining-=cut.length;best.assignments.push({...cut});}
    else unassigned.push(cut);
  }
  const used=rs.filter(r=>r.assignments.length>0);
  const totalUsed=used.reduce((s,r)=>s+(r.length-r.remaining),0);
  const totalAvail=used.reduce((s,r)=>s+r.length,0);
  const usePct=totalAvail>0?((totalUsed/totalAvail)*100).toFixed(1):'0';
  return{used,unassigned,totalUsed,totalAvail,usePct,wasteAbs:totalAvail-totalUsed};
}

function runOptimizer(){
  const sections=[...new Set(state.cuts.map(c=>c.section))];
  const allResults={};
  for(const sec of sections){
    const secReels=state.reels.filter(r=>r.section===sec);
    const secCuts=state.cuts.filter(c=>c.section===sec);
    if(secCuts.length)allResults[sec]=optimizeCuts(secReels,secCuts);
  }
  state.result=allResults;
  document.getElementById('tb-res').disabled=false;
  renderResult();go('res');
}

function renderResult(){
  const content=document.getElementById('res-content');
  let html='';
  for(const[section,res]of Object.entries(state.result)){
    html+=`<div class="result-section">
      <div class="sec-header">
        <span class="badge badge-orange" style="font-size:13px;padding:4px 12px;">قطاع ${section} mm²</span>
        <div class="sec-meta"><span style="color:#4ade80">✓ ${res.usePct}% استخدام</span><span style="color:#fb923c">هدر: ${res.wasteAbs.toFixed(1)} م</span></div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${res.usePct}%"></div></div>`;
    if(res.unassigned.length){
      html+=`<div class="warn-box">⚠️ ${res.unassigned.length} قطعة لم تُعيَّن — كمية البكر غير كافية:<br/>${res.unassigned.map(c=>`• ${c.route} — ${c.length} م`).join('<br/>')}</div>`;
    }
    for(const reel of res.used){
      let pos=reel.length;
      const segs=reel.assignments.map((cut,ci)=>`<div class="vis-seg" title="${cut.route}: ${cut.length}م" style="width:${(cut.length/reel.length*100).toFixed(1)}%;background:hsl(${ci*53%360},65%,45%)"></div>`).join('');
      const rows=reel.assignments.map((cut,ci)=>{
        const endPos=pos;pos-=cut.length;
        return`<tr><td>${ci+1}</td><td style="font-size:11px;font-weight:700">${cut.from}</td><td style="font-size:11px">${cut.to}</td><td><strong style="color:#fbbf24">${cut.length} م</strong></td><td style="color:#64748b;font-size:11px">${endPos.toFixed(1)} م</td><td style="color:#64748b;font-size:11px">${pos.toFixed(1)} م</td></tr>`;
      }).join('');
      html+=`<div class="reel-card">
        <div class="reel-head"><div>
          <span class="reel-id">🎡 بكرة ${reel.id}</span>
          <span class="reel-len">إجمالي: ${reel.length} م | مستخدم: ${(reel.length-reel.remaining).toFixed(1)} م | متبقي: <strong style="color:#fb923c">${reel.remaining.toFixed(1)} م</strong></span>
        </div></div>
        <div class="vis-bar">${segs}<div class="vis-seg" style="flex:1;background:#1e293b;min-width:2px"></div></div>
        <div class="table-wrap"><table>
          <thead><tr><th>#</th><th>من</th><th>إلى</th><th>الطول</th><th>بداية (م)</th><th>نهاية (م)</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>`;
    }
    html+=`</div>`;
  }
  html+=`<div class="summary-box"><div class="summary-title">📋 ملخص المشروع</div>`;
  for(const[sec,res]of Object.entries(state.result)){
    html+=`<div class="summary-row"><span style="color:#F97316;font-weight:700">${sec} mm²</span><span>${res.used.length} بكرة</span><span>${res.used.reduce((a,r)=>a+r.assignments.length,0)} قطعة</span><span style="color:#4ade80">هدر ${(100-parseFloat(res.usePct)).toFixed(1)}%</span></div>`;
  }
  html+=`</div>`;
  content.innerHTML=html;
}

function exportExcel(){
  if(!state.result)return;
  const wb=XLSX.utils.book_new();
  const RED='FFD32F3F', DARKBG='FF0F172A', CARDBG='FF1E293B', WHITE='FFFFFFFF',
        ORANGE='FFF97316', YELLOW='FFFBBF24', GREEN='FF22C55E', MUTED='FF94A3B8',
        BORDER='FF1E3A5F', LIGHTGRAY='FFF1F5F9';

  function cellStyle(opts={}){
    return{
      font:{name:'Cairo', bold:opts.bold||false, color:{rgb:opts.color||WHITE}, sz:opts.sz||11},
      fill:{fgColor:{rgb:opts.bg||DARKBG}, patternType:'solid'},
      alignment:{horizontal:opts.align||'right', vertical:'center', wrapText:false, readingOrder:2},
      border:{
        top:{style:'thin',color:{rgb:BORDER}}, bottom:{style:'thin',color:{rgb:BORDER}},
        left:{style:'thin',color:{rgb:BORDER}}, right:{style:'thin',color:{rgb:BORDER}}
      }
    };
  }

  function setCell(ws, addr, value, style){
    if(!ws[addr]) ws[addr]={};
    ws[addr].v=value; ws[addr].s=style;
    if(typeof value==='number') ws[addr].t='n';
    else ws[addr].t='s';
  }

  for(const[section,res]of Object.entries(state.result)){
    const ws={};
    let row=1;
    const range={s:{r:0,c:0},e:{r:0,c:5}};

    // ── Title row ──
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),'EPIC FOR CONTRACTING',
      cellStyle({bold:true,color:WHITE,bg:RED,sz:14,align:'center'}));
    for(let c=1;c<=5;c++) setCell(ws,XLSX.utils.encode_cell({r:row-1,c}), '',
      cellStyle({bg:RED}));
    ws['!merges']=[{s:{r:row-1,c:0},e:{r:row-1,c:5}}];
    row++;

    // ── Subtitle ──
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),'Cable Cutting List — Optimized',
      cellStyle({bold:true,color:ORANGE,bg:CARDBG,sz:12,align:'center'}));
    for(let c=1;c<=5;c++) setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),'',cellStyle({bg:CARDBG}));
    ws['!merges'].push({s:{r:row-1,c:0},e:{r:row-1,c:5}});
    row++;

    // ── Section info ──
    const infoStyle=cellStyle({bg:CARDBG,color:MUTED,sz:10});
    const infoValStyle=cellStyle({bg:CARDBG,color:ORANGE,bold:true,sz:11});
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),`قطاع الكابل: ${section} mm²`,infoValStyle);
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:1}),'',infoStyle);
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:2}),`نسبة الاستخدام: ${res.usePct}%`,cellStyle({bg:CARDBG,color:GREEN,bold:true,sz:11}));
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:3}),'',infoStyle);
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:4}),`الهدر: ${res.wasteAbs.toFixed(1)} م`,cellStyle({bg:CARDBG,color:'FFFB923C',bold:true,sz:11}));
    setCell(ws,XLSX.utils.encode_cell({r:row-1,c:5}),'',infoStyle);
    row++;

    // ── Empty spacer ──
    for(let c=0;c<=5;c++) setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),'',cellStyle({bg:DARKBG}));
    row++;

    for(const reel of res.used){
      // ── Reel header ──
      const reelBg='FF1E3A5F';
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),`🎡  بكرة رقم: ${reel.id}`,cellStyle({bold:true,color:WHITE,bg:reelBg,sz:12}));
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:1}),`الطول: ${reel.length} م`,cellStyle({bg:reelBg,color:MUTED,sz:10}));
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:2}),`مستخدم: ${(reel.length-reel.remaining).toFixed(1)} م`,cellStyle({bg:reelBg,color:GREEN,bold:true,sz:10}));
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:3}),'',cellStyle({bg:reelBg}));
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:4}),`متبقي: ${reel.remaining.toFixed(1)} م`,cellStyle({bg:reelBg,color:'FFFB923C',bold:true,sz:10}));
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:5}),'',cellStyle({bg:reelBg}));
      row++;

      // ── Column headers ──
      const hStyle=cellStyle({bold:true,color:WHITE,bg:'FF0F2744',sz:11});
      ['#','من (المصدر)','إلى (الوجهة)','الطول (م)','بداية (م)','نهاية (م)'].forEach((h,c)=>{
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),h,hStyle);
      });
      row++;

      // ── Data rows ──
      let pos=reel.length;
      reel.assignments.forEach((cut,ci)=>{
        const endPos=pos; pos-=cut.length;
        const isEven=ci%2===0;
        const rowBg=isEven?'FF0F172A':'FF111827';
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),ci+1,cellStyle({bg:rowBg,color:MUTED,align:'center'}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:1}),cut.from,cellStyle({bg:rowBg,color:WHITE,bold:true}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:2}),cut.to,cellStyle({bg:rowBg,color:LIGHTGRAY}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:3}),cut.length,cellStyle({bg:rowBg,color:YELLOW,bold:true,align:'center'}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:4}),parseFloat(endPos.toFixed(1)),cellStyle({bg:rowBg,color:MUTED,align:'center'}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:5}),parseFloat(pos.toFixed(1)),cellStyle({bg:rowBg,color:MUTED,align:'center'}));
        row++;
      });

      // ── Spacer after reel ──
      for(let c=0;c<=5;c++) setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),'',cellStyle({bg:DARKBG}));
      row++;
    }

    // ── Unassigned ──
    if(res.unassigned.length){
      setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),'⚠️  قطعيات لم تُعيَّن — كمية البكر غير كافية',
        cellStyle({bold:true,color:YELLOW,bg:'FF451A03',sz:11}));
      for(let c=1;c<=5;c++) setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),'',cellStyle({bg:'FF451A03'}));
      row++;
      ['من (المصدر)','إلى (الوجهة)','الطول (م)','','',''].forEach((h,c)=>{
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),h,cellStyle({bold:true,color:WHITE,bg:'FF0F2744',sz:11}));
      });
      row++;
      res.unassigned.forEach((cut,ci)=>{
        const rowBg=ci%2===0?'FF0F172A':'FF111827';
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:0}),cut.from,cellStyle({bg:rowBg,color:WHITE,bold:true}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:1}),cut.to,cellStyle({bg:rowBg,color:LIGHTGRAY}));
        setCell(ws,XLSX.utils.encode_cell({r:row-1,c:2}),cut.length,cellStyle({bg:rowBg,color:YELLOW,bold:true,align:'center'}));
        for(let c=3;c<=5;c++) setCell(ws,XLSX.utils.encode_cell({r:row-1,c}),'',cellStyle({bg:rowBg}));
        row++;
      });
    }

    range.e.r=row-1;
    ws['!ref']=XLSX.utils.encode_range(range);
    ws['!cols']=[{wch:5},{wch:22},{wch:22},{wch:14},{wch:14},{wch:14}];
    ws['!rows']=Array.from({length:row},(_,i)=>({hpt: i===0?22:i===1?16:18}));
    const sheetName=`${section.replace(/[\/\\?*\[\]:]/g,'_')} mm2`.slice(0,31);
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  }

  // ── Summary sheet ──
  const ws2={};
  let r2=1;
  function sc2(addr,v,style){
    if(!ws2[addr])ws2[addr]={};
    ws2[addr].v=v;ws2[addr].s=style;
    ws2[addr].t=typeof v==='number'?'n':'s';
  }
  sc2(XLSX.utils.encode_cell({r:0,c:0}),'EPIC FOR CONTRACTING — ملخص المشروع',
    cellStyle({bold:true,color:WHITE,bg:RED,sz:14,align:'center'}));
  for(let c=1;c<=5;c++) sc2(XLSX.utils.encode_cell({r:0,c}),'',cellStyle({bg:RED}));
  ws2['!merges']=[{s:{r:0,c:0},e:{r:0,c:5}}];
  r2=2;

  ['القطاع','البكر المستخدمة','القطعيات','الطول المستخدم (م)','الهدر (م)','% الاستخدام'].forEach((h,c)=>{
    sc2(XLSX.utils.encode_cell({r:r2-1,c}),h,cellStyle({bold:true,color:WHITE,bg:'FF0F2744',sz:11}));
  });
  r2++;

  Object.entries(state.result).forEach(([sec,res],ri)=>{
    const bg=ri%2===0?'FF0F172A':'FF111827';
    sc2(XLSX.utils.encode_cell({r:r2-1,c:0}),`${sec} mm²`,cellStyle({bg,color:ORANGE,bold:true}));
    sc2(XLSX.utils.encode_cell({r:r2-1,c:1}),res.used.length,cellStyle({bg,color:WHITE,align:'center'}));
    sc2(XLSX.utils.encode_cell({r:r2-1,c:2}),res.used.reduce((a,r2)=>a+r2.assignments.length,0),cellStyle({bg,color:WHITE,align:'center'}));
    sc2(XLSX.utils.encode_cell({r:r2-1,c:3}),parseFloat(res.totalUsed.toFixed(1)),cellStyle({bg,color:GREEN,bold:true,align:'center'}));
    sc2(XLSX.utils.encode_cell({r:r2-1,c:4}),parseFloat(res.wasteAbs.toFixed(1)),cellStyle({bg,color:'FFFB923C',bold:true,align:'center'}));
    sc2(XLSX.utils.encode_cell({r:r2-1,c:5}),`${res.usePct}%`,cellStyle({bg,color:GREEN,bold:true,align:'center'}));
    r2++;
  });
  ws2['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:r2-1,c:5}});
  ws2['!cols']=[{wch:18},{wch:18},{wch:14},{wch:22},{wch:14},{wch:16}];
  ws2['!rows']=[{hpt:22},{hpt:18},...Array(r2-2).fill({hpt:18})];
  XLSX.utils.book_append_sheet(wb,ws2,'ملخص المشروع');

  const date=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`Epic_CuttingList_${date}.xlsx`,{bookType:'xlsx',cellStyles:true});
}

function manualSave(){
  try{

function updateBadge(){

  var el=document.getElementById('backup-badge');

}
function restoreBackup(){
  try{
    var raw=localStorage.getItem('epic_ab');
    if(!raw){showMsg('لا توجد نسخة احتياطية','red');return;}
    var d=JSON.parse(raw);
    if(!d.reels)throw new Error('بيانات غير صالحة');
    state.sections=d.sections||[];state.reels=d.reels||[];state.cuts=d.cuts||[];state.result=null;
    document.getElementById('tb-res').disabled=true;
    updateStats();renderSections();renderReelsTable();renderCutsTable();
    var savedDate=d.savedAt?(' ('+d.savedAt.slice(0,10)+')'):''; showMsg('تم الاستعادة: '+state.reels.length+' بكرة، '+state.cuts.length+' قطعة'+savedDate,'green');
  }catch(e){showMsg('خطأ: '+e.message,'red');}
}

function doPDF(){
  try{
    if(!state.result){alert('احسب Cutting List اولا');return;}
    var logo=document.querySelector('#logo-wrap img')?document.querySelector('#logo-wrap img').src:'';
    var dAr=new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
    var dEn=new Date().toISOString().slice(0,10);
    var secs=Object.entries(state.result);
    var C=['#e74c4c', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4', '#f97316', '#ec4899', '#14b8a6', '#6366f1'];
    var pages='';
    for(var si=0;si<secs.length;si++){
      var sec=secs[si][0],res=secs[si][1];
      var tc=res.used.reduce(function(a,r){return a+r.assignments.length;},0);
      var pg='<div class="pp">';
      /* header */
      pg+='<div class="ph"><div class="ph-top"><div class="ph-brand">';
      if(logo)pg+='<img src="'+logo+'" class="ph-logo"/>';
      pg+='<div><div class="ph-co">EPIC FOR CONTRACTING</div><div class="ph-cosub">Cable Cutting Optimizer</div></div>';
      pg+='</div><div class="ph-date"><div><b>Cable Cutting List</b></div><div>'+dAr+'</div><div>'+dEn+'</div></div></div>';
      pg+='<div class="ph-band"><span class="ph-sbadge">'+sec+' mm&sup2;</span>';
      pg+='<span class="ph-stat">بكر: <b>'+res.used.length+'</b></span>';
      pg+='<span class="ph-stat">قطعيات: <b>'+tc+'</b></span>';
      pg+='<span class="ph-stat"><b style="color:#059669">'+res.usePct+'%</b> استخدام</span>';
      pg+='<span class="ph-stat"><b style="color:#d97706">'+res.wasteAbs.toFixed(1)+'m</b> هدر</span>';
      pg+='<div class="ph-pbar"><div class="ph-pfill" style="width:'+res.usePct+'%"></div></div>';
      pg+='</div></div>';
      /* body */
      pg+='<div class="pb">';
      if(res.unassigned&&res.unassigned.length){
        pg+='<div class="pb-warn">&#9888; '+res.unassigned.map(function(c){return c.from+' &rarr; '+c.to+' ('+c.length+'m)';}).join(' | ')+'</div>';
      }
      for(var ri=0;ri<res.used.length;ri++){
        var reel=res.used[ri];
        var ul=(reel.length-reel.remaining).toFixed(1);
        var up=(parseFloat(ul)/reel.length*100).toFixed(0);
        pg+='<div class="pr"><div class="pr-hdr">';
        pg+='<span class="pr-title">&#127969; بكرة: '+reel.id+'</span>';
        pg+='<span class="pr-info">إجمالي '+reel.length+'m | <span class="pr-used">'+ul+'m ('+up+'%)</span> | <span class="pr-rem">متبقي '+reel.remaining.toFixed(1)+'m</span></span>';
        pg+='</div>';
        /* vis bar */
        pg+='<div class="pr-vis">';
        for(var ci=0;ci<reel.assignments.length;ci++){
          var c0=reel.assignments[ci];
          var pct=(c0.length/reel.length*100).toFixed(2);
          pg+='<div style="width:'+pct+'%;height:100%;background:'+C[ci%C.length]+';opacity:.8"></div>';
        }
        if(reel.remaining>0){
          var rp=(reel.remaining/reel.length*100).toFixed(2);
          pg+='<div style="width:'+rp+'%;height:100%;background:#e8eaed"></div>';
        }
        pg+='</div>';
        /* legend */
        pg+='<div class="pr-legend">';
        for(var ci=0;ci<reel.assignments.length;ci++){
          var c1=reel.assignments[ci];
          pg+='<div class="pr-leg"><div class="pr-leg-dot" style="background:'+C[ci%C.length]+'"></div>';
          pg+='<div class="pr-leg-txt"><b>'+(ci+1)+'.</b> '+c1.from+' &rarr; '+c1.to+' ('+c1.length+'m)</div></div>';
        }
        if(reel.remaining>0){
          pg+='<div class="pr-leg"><div class="pr-leg-dot" style="background:#e8eaed;border:1px solid #d1d5db"></div>';
          pg+='<div class="pr-leg-txt" style="color:#9aa0ab">هدر ('+reel.remaining.toFixed(1)+'m)</div></div>';
        }
        pg+='</div>';
        /* table */
        pg+='<table class="pt"><thead><tr><th style="width:20px">#</th>';
        pg+='<th>من</th><th>إلى</th>';
        pg+='<th style="text-align:center">الطول</th>';
        pg+='<th style="text-align:center">بداية</th>';
        pg+='<th style="text-align:center">نهاية</th>';
        pg+='<th style="text-align:center">%</th></tr></thead><tbody>';
        var pos=reel.length;
        for(var ci=0;ci<reel.assignments.length;ci++){
          var cut=reel.assignments[ci];
          var col=C[ci%C.length];
          var ep=pos; pos-=cut.length;
          var pct2=(cut.length/reel.length*100).toFixed(1);
          pg+='<tr><td style="text-align:center"><span style="background:'+col+';color:#fff;border-radius:3px;padding:1px 5px;font-size:9px;font-weight:800">'+(ci+1)+'</span></td>';
          pg+='<td><b style="color:#1a1d23">'+cut.from+'</b></td>';
          pg+='<td style="color:#6b7280">'+cut.to+'</td>';
          pg+='<td style="text-align:center"><b style="color:#c0392b">'+cut.length+'m</b></td>';
          pg+='<td style="text-align:center;color:#374151">'+ep.toFixed(1)+'</td>';
          pg+='<td style="text-align:center;color:#374151">'+pos.toFixed(1)+'</td>';
          pg+='<td style="text-align:center;color:#6b7280">'+pct2+'%</td></tr>';
        }
        if(reel.remaining>0){
          pg+='<tr class="waste"><td style="text-align:center;color:#d97706">-</td>';
          pg+='<td colspan="2" style="color:#92400e">هدر متبقي</td>';
          pg+='<td style="text-align:center;color:#d97706;font-weight:700">'+reel.remaining.toFixed(1)+'m</td>';
          pg+='<td style="text-align:center;color:#92400e">'+pos.toFixed(1)+'</td>';
          pg+='<td style="text-align:center;color:#92400e">0.0</td>';
          pg+='<td style="text-align:center;color:#d97706">'+((reel.remaining/reel.length)*100).toFixed(1)+'%</td></tr>';
        }
        pg+='</tbody></table></div>';
      }
      /* summary */
      pg+='<div class="ps"><div class="ps-ttl">&#128203; ملخص</div>';
      pg+='<table class="pt"><thead><tr><th>القطاع</th>';
      pg+='<th style="text-align:center">بكر</th><th style="text-align:center">قطع</th>';
      pg+='<th style="text-align:center">مستخدم</th>';
      pg+='<th style="text-align:center">هدر</th><th style="text-align:center">%</th></tr></thead><tbody>';
      for(var xi=0;xi<secs.length;xi++){
        var xs=secs[xi][0],xr=secs[xi][1];
        var xc=xr.used.reduce(function(a,r){return a+r.assignments.length;},0);
        pg+='<tr><td><b style="color:#c0392b">'+xs+' mm&sup2;</b></td>';
        pg+='<td style="text-align:center;font-weight:700">'+xr.used.length+'</td>';
        pg+='<td style="text-align:center;font-weight:700">'+xc+'</td>';
        pg+='<td style="text-align:center"><b style="color:#059669">'+xr.totalUsed.toFixed(1)+'m</b></td>';
        pg+='<td style="text-align:center"><b style="color:#d97706">'+xr.wasteAbs.toFixed(1)+'m</b></td>';
        pg+='<td style="text-align:center"><b style="color:#059669">'+xr.usePct+'%</b></td></tr>';
      }
      pg+='</tbody></table></div></div>';
      pg+='<div class="pf"><span class="pf-brand">EPIC FOR CONTRACTING</span><span>Cable Cutting Optimizer</span><span>'+dEn+' - '+(si+1)+'/'+secs.length+'</span></div>';
      pg+='</div>';
      pages+=pg;
    }
    document.getElementById('pv').innerHTML=pages;
    setTimeout(function(){window.print();},150);
  }catch(e){alert('PDF Error: '+e.message);console.error(e);}
}

    input.value='';
  };
  reader.readAsText(file);
}

    lines.push('• الهدر: '+res.wasteAbs.toFixed(1)+' م');
    lines.push('');
    for(var ri=0;ri<res.used.length;ri++){
      var reel=res.used[ri];
      lines.push('🎡 *بكرة '+reel.id+'* ('+reel.length+'م):');
      var pos=reel.length;
      for(var ci=0;ci<reel.assignments.length;ci++){
        var cut=reel.assignments[ci];
        var endP=pos; pos-=cut.length;
        lines.push('  '+(ci+1)+'. '+cut.from+' ← '+cut.to+' | *'+cut.length+'م* | ('+endP.toFixed(0)+'←'+pos.toFixed(0)+')');
      }
    }
    if(res.unassigned&&res.unassigned.length){
      lines.push('');
      lines.push('⚠️ لم تُعيَّن: '+res.unassigned.map(function(c){return c.from+'→'+c.to+'('+c.length+'م)';}).join(', '));

  }
  lines.push('');

  lines.push('📅 '+new Date().toLocaleDateString('ar-EG'));
  var text=lines.join('\n');
  var url='https://wa.me/?text='+encodeURIComponent(text);
  window.open(url,'_blank');
}
