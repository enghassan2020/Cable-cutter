name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -keystore keystore.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias epickey \
            -dname "CN=Epic, OU=IT, O=Epic, L=Cairo, S=Cairo, C=EG" \
            -storepass epiccable2024 \
            -keypass epiccable2024 \
            -noprompt

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create TWA Manifest
        run: |
          mkdir twa
          cat > twa/twa-manifest.json << 'TWAEOF'
          {
            "packageId": "com.epiccontracting.cablecutter",
            "host": "enghassan2020.github.io",
            "name": "Epic Cable Cutter",
            "launcherName": "Cable Cutter",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#c0392b",
            "navigationColor": "#c0392b",
            "backgroundColor": "#f0f2f5",
            "enableNotifications": false,
            "startUrl": "/Cable-cutter/",
            "iconUrl": "https://enghassan2020.github.io/Cable-cutter/icon-512.png",
            "maskableIconUrl": "https://enghassan2020.github.io/Cable-cutter/icon-512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../../keystore.jks",
              "alias": "epickey"
            },
            "fullScopeUrl": "https://enghassan2020.github.io/Cable-cutter/",
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "enableSiteSettingsShortcut": false,
            "splashScreenFadeOutDuration": 300
          }
          TWAEOF

      - name: Build APK
        run: |
          cd twa
          bubblewrap build --manifest twa-manifest.json --skipPwaValidation
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: epiccable2024
          BUBBLEWRAP_KEY_PASSWORD: epiccable2024

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Epic-Cable-Cutter-APK
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
